{{ $url := .Get "src" }}
{{ $hidePaginator := .Get "hidePaginator" | default "false" }}
{{ $hideLoader := .Get "hidePaginator" | default "false" }}
{{ $pageNum := .Get "page" | default "1"}}

<div class="pdf-viewer" data-url="{{ $url }}" data-hide-paginator="{{ $hidePaginator }}"
  data-hide-loader="{{ $hideLoader }}" data-page-num="{{ $pageNum }}">
  <div class="paginator">
    <div class="download-btn">
      <a href="{{ $url }}" download class="btn btn-sm btn-info download-pdf-btn">
        <i class="fas fa-download"></i> Download
      </a>
    </div>

    <div class="next-prev-btn">
      <button class="prev btn btn-sm btn-info">
        <i class="fas fa-circle-left"></i>
        Previous
      </button>
      <div class="page-info">
        <div>Page</div> 
        <div><span class="page-num"></span> / <span class="page-count"></span></div>
      </div>
      <button class="next btn btn-sm btn-info">
        Next
        <i class="fas fa-circle-right"></i>
      </button>
    </div>
    
  </div>

  <div class="embed-pdf-container">
    <div class="loading-wrapper">
      <div class="loading"></div>
    </div>
    <canvas class="pdf-canvas"></canvas>
  </div>
</div>
