{{- $user := "" -}}
{{- $id := "" -}}
{{- $file := "" -}}

{{- if .IsNamedParams -}}
	{{- $user = .Get "user" -}}
	{{- $id = .Get "id" -}}
	{{- $file = .Get "file" -}}
{{- else -}}
	{{- $user = .Get 0 -}}
	{{- $id = .Get 1 -}}
	{{- if ge (len .Params) 3 -}}
		{{- $file = .Get 2 -}}
	{{- end -}}
{{- end -}}

<script src="https://gist.github.com/{{ $user }}/{{ $id }}.js{{ with $file }}?file={{ . }}{{ end }}"></script>
