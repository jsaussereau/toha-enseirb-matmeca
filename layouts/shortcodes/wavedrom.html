{{ $alignment := .Get "align" }}
{{ if not $alignment }}
  {{ $alignment = "center" }}
{{ end }}

{{ $background := .Get "background" }}
{{ if not $background }}
  {{ $background = "none" }}
{{ end }}

<div class="wavedrom" data-theme="" align="{{ $alignment }}" style="background-color: {{ $background }}; border-radius: 5px;">
  <script type="WaveDrom">
{{- .Inner | safeHTML -}}
  </script>
</div>
